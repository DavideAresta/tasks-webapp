development:
  adapter: postgresql
  encoding: unicode
  database: myapp_development
  pool: 5
  username: myapp_user
  password: secure_password
  host: localhost

production:
  adapter: postgresql
  encoding: unicode
  database: myapp_production
  pool: 5
  username: myapp_user
  password: secure_password
  host: production_db_host

database:
  url: jdbc:postgresql://localhost:5432/myapp
  username: myapp_user
  password: securepassword
  driverClassName: org.postgresql.Driver
  maxPoolSize: 10
  minIdle: 2
  idleTimeout: 30000
  connectionTimeout: 30000
  maxLifetime: 1800000